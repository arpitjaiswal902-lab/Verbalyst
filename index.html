<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verbalyst - Master Your Tech Interview</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

</head>
<body>
    <div id="root">
      <main class="landing-container">
        <!-- Left Side: Marketing/Value Prop -->
        <section class="hero-content">

          <p class="hero-subtitle">Get AI-powered feedback, real-world mock interviews, and personalized coaching to ace your next tech interview.</p>
          
          <div class="social-proof">
            <p>TRUSTED BY CANDIDATES AT</p>
            <div class="logo-grid">
              <span>Google</span> <span>Meta</span> <span>Stripe</span> <span>Amazon</span>
            </div>
          </div>
        </section>

        <!-- Right Side: Action/Login -->
        <section class="auth-section">
          <!-- Your React/Vite App will render the Login Card here -->
          <div id="login-portal"></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
