<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verbalyst - Master Your Tech Interview</title>
    
    <!-- This is where your CSS goes! Wrapped in <style> tags -->
    <style>
        /* --- Root & Layout --- */
        html { height: 100%; margin: 0; }
        body { 
            min-height: 100dvh; margin: 0; display: flex; align-items: center; justify-content: center; 
            background-color: #020617;
            background-image: radial-gradient(circle at 50% -20%, #1e40af 0%, transparent 50%), radial-gradient(circle at 0% 100%, #1e3a8a 0%, transparent 30%), radial-gradient(circle at 100% 100%, #312e81 0%, transparent 30%);
            overflow: hidden; font-family: system-ui, -apple-system, sans-serif;
        }
        
        .ai-god-card { background: rgba(15, 23, 42, 0.8) !important; backdrop-filter: blur(24px) saturate(180%) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05), 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important; color: #f8fafc !important; padding: 32px !important; border-radius: 24px !important; width: 100% !important; max-width: 440px !important; position: relative !important; margin: 16px !important; animation: float 6s ease-in-out infinite !important; }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        @keyframes beam { 0%, 100% { offset-distance: 0%; } 50% { offset-distance: 100%; } }
        
        .ai-god-card::after { content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px; background: linear-gradient(90deg, transparent, #3b82f6, #6366f1, transparent); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.5; }
        
        h2 { font-weight: 800 !important; letter-spacing: -0.05em !important; font-size: 32px !important; background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { background: rgba(255, 255, 255, 0.03) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; padding: 12px 16px !important; border-radius: 12px !important; transition: all 0.2s ease !important; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2) !important; background: rgba(255,255,255,0.07) !important; }
        
        @media (max-width: 640px) { input { font-size: 16px !important; } .ai-god-card { padding: 24px !important; border-radius: 20px !important; } }
    </style>
</head>
<body>
    <!-- THIS IS THE MOST IMPORTANT PART: The root for your React App -->
    <div id="root"></div>
    
    <!-- This line tells the browser to run your actual code -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
